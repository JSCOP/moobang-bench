name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          EXPO_PUBLIC_ADSENSE_CLIENT: ${{ secrets.EXPO_PUBLIC_ADSENSE_CLIENT }}
          EXPO_PUBLIC_ADSENSE_SLOT_TOP: ${{ secrets.EXPO_PUBLIC_ADSENSE_SLOT_TOP }}
          EXPO_PUBLIC_ADSENSE_SLOT_BENCHMARK: ${{ secrets.EXPO_PUBLIC_ADSENSE_SLOT_BENCHMARK }}
          EXPO_PUBLIC_ADSENSE_SLOT_RESULT: ${{ secrets.EXPO_PUBLIC_ADSENSE_SLOT_RESULT }}
      - uses: cloudflare/wrangler-action@v3
        if: env.CF_API_TOKEN != '' && env.CF_ACCOUNT_ID != ''
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=moobangbench
