            this.nextNoteTime += this.beatDuration / 4; // 16th notes
            this.stepIndex = (this.stepIndex + 1) % 16;
        }

        // Keep loop alive
        setTimeout(() => this.musicScheduler(), 30);
    }

    scheduleBeat(step, time) {
        // Kick on every beat (steps 0, 4, 8, 12)
        if (step % 4 === 0) {
            this.triggerKick(time);
        }
        
        // Snare on steps 4, 12
        if (step === 4 || step === 12) {
            this.triggerSnare(time);
        }

        // Hi-hat on 8th notes (steps 0, 2, 4, 6, 8, 10, 12, 14)
        if (step % 2 === 0) {
            this.triggerHiHat(time);
        }

        // Bass Synth Melody line
        if (step % 2 === 0) {
            let noteIdx = Math.floor(Math.sin(step + this.beatCount) * 3) + 2;
            if (noteIdx < 0) noteIdx = 0;
            if (noteIdx >= this.melodyNotes.length) noteIdx = this.melodyNotes.length - 1;
            
            let frequency = this.melodyNotes[noteIdx];
            // Raise octaves occasionally on intense difficulties
            if ((this.tempo > 130) && (step % 8 === 0)) {
                frequency *= 2;
            }
            this.triggerSynth(frequency, time, this.beatDuration / 2);
        }

        if (step === 15) {
            this.beatCount++;
        }
    }

    triggerKick(time) {
        if (!this.ctx || !this.masterVolume) return;
        
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        
        osc.connect(gain);
        gain.connect(this.masterVolume);
        
        osc.frequency.setValueAtTime(120, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);
        
        gain.gain.setValueAtTime(0.8, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
        
        osc.start(time);
        osc.stop(time + 0.3);
    }

    triggerSnare(time) {
        if (!this.ctx || !this.masterVolume) return;
        
        // White noise buffer
        let bufferSize = this.ctx.sampleRate * 0.15;
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        
        let filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(1000, time);
        
        let gain = this.ctx.createGain();
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterVolume);
        
        gain.gain.setValueAtTime(0.3, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
        
        noise.start(time);
        noise.stop(time + 0.15);
    }

    triggerHiHat(time) {
        if (!this.ctx || !this.masterVolume) return;

        let bufferSize = this.ctx.sampleRate * 0.04;
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;

        let filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(8000, time);

        let gain = this.ctx.createGain();

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterVolume);

        gain.gain.setValueAtTime(0.12, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.04);

        noise.start(time);
        noise.stop(time + 0.04);
    }

    triggerSynth(freq, time, duration) {
        if (!this.ctx || !this.masterVolume) return;

        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, time);

        osc.connect(gain);
        gain.connect(this.masterVolume);

        gain.gain.setValueAtTime(0.18, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + duration);

        osc.start(time);
        osc.stop(time + duration);
    }

    playSFX(type) {
        this.init();
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }

        let time = this.ctx.currentTime;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();

        osc.connect(gain);
        gain.connect(this.masterVolume);

        switch (type) {
            case 'jump_cube':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, time);
                osc.frequency.exponentialRampToValueAtTime(600, time + 0.1);
                gain.gain.setValueAtTime(0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.start(time);
                osc.stop(time + 0.1);
                break;
            case 'jump_ufo':
                osc.type = 'square';
                osc.frequency.setValueAtTime(450, time);
                osc.frequency.linearRampToValueAtTime(300, time + 0.08);
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
                osc.start(time);
                osc.stop(time + 0.08);
                break;
            case 'jump_robot':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(400, time + 0.15);
                gain.gain.setValueAtTime(0.35, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                osc.start(time);
                osc.stop(time + 0.15);
                break;
            case 'jump_spider':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, time);
                osc.frequency.exponentialRampToValueAtTime(200, time + 0.07);
                gain.gain.setValueAtTime(0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.07);
                osc.start(time);
                osc.stop(time + 0.07);
                break;
            case 'wave_sweep':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, time);
                osc.frequency.exponentialRampToValueAtTime(800, time + 0.2);
                gain.gain.setValueAtTime(0.25, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                osc.start(time);
                osc.stop(time + 0.2);
                break;
            case 'bounce':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, time);
                osc.frequency.exponentialRampToValueAtTime(700, time + 0.25);
                gain.gain.setValueAtTime(0.5, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
                osc.start(time);
                osc.stop(time + 0.25);
                break;
            case 'orb':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, time);
                osc.frequency.exponentialRampToValueAtTime(1000, time + 0.12);
                gain.gain.setValueAtTime(0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.12);
                osc.start(time);
                osc.stop(time + 0.12);
                break;
            case 'gravity':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, time);
                osc.frequency.linearRampToValueAtTime(150, time + 0.25);
                gain.gain.setValueAtTime(0.35, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
                osc.start(time);
                osc.stop(time + 0.25);
                break;
            case 'coin':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, time); // B5
                osc.frequency.setValueAtTime(1318.51, time + 0.08); // E6
                gain.gain.setValueAtTime(0.45, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);
                osc.start(time);
                osc.stop(time + 0.35);
                break;
            case 'death':
                // Retro low frequency thud + noise burst
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, time);
                osc.frequency.linearRampToValueAtTime(40, time + 0.4);
                gain.gain.setValueAtTime(0.65, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.4);
                osc.start(time);
                osc.stop(time + 0.4);
                break;
        }
    }
}


// Full unified JS loader to compile all code blocks, hook controls, and run the canvas loop.
// This matches MENU -> PLAYING -> DEAD states, handles rendering, parallax scroll, and HUD.

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.particleSystem = new ParticleSystem();
        this.audioEngine = new AudioEngine();
        
        // Settings states
        this.isAI = true;
        this.soundOn = true;
        this.showSeed = true;
        this.showFPS = false;
        this.volume = 0.5;
        this.currentSeed = Math.floor(Math.random() * 999999);
        this.difficulty = 'NORMAL';
        
        // Game states
        this.state = 'MENU'; // MENU, PLAYING, DEAD
        this.attempts = 1;
        this.score = 0;
        this.collectedCoins = 0;
        
        // Mechanics
        this.player = null;
        this.levelGen = null;
        this.ai = new GDAutoPlayAI();
        
        // Physics environment bounds
        this.floorY = 500;
        this.ceilingY = 100;
        
        // Camera horizontal and vertical tracking
        this.cameraX = 0;
        this.cameraY = 0;
        this.screenShakeTime = 0;
        this.screenShakeIntensity = 0;
        this.flashTime = 0;
        this.flashColor = '#ffffff';
        this.isMirrorVisual = false;
        this.mirrorTimer = 0;

        // Delta time trackers
        this.lastTime = 0;
        this.fps = 60;
        this.fpsTimer = 0;
        this.fpsCounter = 0;
        
        // Inputs
        this.keys = {};
        this.inputPressed = false;
        this.inputHeld = false;
        this.prevInputHeld = false;
        
        this.setupEvents();
    }

    setupEvents() {
        // Keyboard inputs
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            
            // Trigger jump states
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                this.inputPressed = true;
                this.inputHeld = true;
            }

            // Key mappings
            if (e.code === 'KeyA') {
                this.isAI = !this.isAI;
                this.updateSettingsUI();
            }
            if (e.code === 'KeyM') {
                this.soundOn = !this.soundOn;
                this.audioEngine.setVolume(this.soundOn ? this.volume : 0);
                this.updateSettingsUI();
            }
            if (e.code === 'KeyS') {
                this.showSeed = !this.showSeed;
                this.updateSettingsUI();
            }
            if (e.code === 'KeyF') {
                this.showFPS = !this.showFPS;
                this.updateSettingsUI();
            }
            if (e.code === 'KeyR') {
                if (this.state === 'DEAD') this.restartRun();
            }
            if (e.code === 'KeyD') {
                if (this.state === 'MENU') {
                    this.cycleDifficulty();
                }
            }
            if (e.code === 'Escape') {
                if (this.state === 'PLAYING') {
                    this.triggerDeath();
                } else if (this.state === 'DEAD') {
                    this.showMenu();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                this.inputHeld = false;
            }
        });

        // Touch & Click inputs for mobile/mouse play
        const interactHandler = (e) => {
            if (e.target.closest('button') || e.target.closest('input')) return; // ignore UI elements
            
            this.inputPressed = true;
            this.inputHeld = true;
            
            // Auto-trigger restart on click/tap if dead
            if (this.state === 'DEAD') {
                this.restartRun();
            }
        };

        const releaseHandler = (e) => {
            this.inputHeld = false;
        };

        this.canvas.addEventListener('mousedown', interactHandler);
        this.canvas.addEventListener('mouseup', releaseHandler);
        
        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            interactHandler(e);
        });
        this.canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            releaseHandler(e);
        });

        // Resize handler
        window.addEventListener('resize', () => this.resizeCanvas());
        this.resizeCanvas();
    }

    resizeCanvas() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    initRun(seed, difficulty) {
        this.currentSeed = seed;
        this.difficulty = difficulty;
        this.collectedCoins = 0;
        this.score = 0;
        
        // Spawn player slightly off center
        this.player = new Player(100, 400);
        this.player.vx = DIFFICULTIES[difficulty].speed;
        
        // Instantiate level generator
        this.levelGen = new LevelGenerator(seed, difficulty);
        
        // Pre-generate 3 chunks initially
        this.levelGen.generateNextChunk();
        this.levelGen.generateNextChunk();
        this.levelGen.generateNextChunk();
        
        // Start background music loop
        if (this.soundOn) {
            this.audioEngine.startMusic(difficulty);
        } else {
            this.audioEngine.stopMusic();
        }
        
        this.state = 'PLAYING';
        this.cameraX = 0;
        this.cameraY = 0;
        
        // Show HUD overlay
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        
        document.getElementById('hud-attempt').innerText = this.attempts;
        this.updateHUDCoins();
    }

    restartRun() {
        this.attempts++;
        this.initRun(this.currentSeed, this.difficulty);
    }

    showMenu() {
        this.state = 'MENU';
        this.audioEngine.stopMusic();
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
        this.updateSettingsUI();
    }

    cycleDifficulty() {
        const keys = Object.keys(DIFFICULTIES);
        const currentIndex = keys.indexOf(this.difficulty);
        const nextIndex = (currentIndex + 1) % keys.length;
        this.difficulty = keys[nextIndex];

        // Update selected card styling in the DOM
        const cards = document.querySelectorAll('.diff-card');
        cards.forEach(card => {
            card.classList.remove('selected');
            if (card.classList.contains(`diff-${this.difficulty.toLowerCase()}`)) {
                card.classList.add('selected');
            }
        });
    }
    updateSettingsUI() {
        // Mode & Status UI update helper
        const btnAI = document.getElementById('toggle-ai-menu');
        btnAI.className = `setting-toggle ${this.isAI ? 'active' : ''}`;
        btnAI.innerText = `AI AUTO-PLAY: ${this.isAI ? 'ON' : 'OFF'} [A]`;

        const btnSound = document.getElementById('toggle-sound-menu');
        btnSound.className = `setting-toggle ${this.soundOn ? 'active' : ''}`;
        btnSound.innerText = `SOUNDS: ${this.soundOn ? 'ON' : 'OFF'} [M]`;

        const btnSeed = document.getElementById('toggle-seed-menu');
        btnSeed.className = `setting-toggle ${this.showSeed ? 'active' : ''}`;
        btnSeed.innerText = `SEED: ${this.showSeed ? 'SHOW' : 'HIDE'} [S]`;

        const btnFPS = document.getElementById('toggle-fps-menu');
        btnFPS.className = `setting-toggle ${this.showFPS ? 'active' : ''}`;
        btnFPS.innerText = `FPS: ${this.showFPS ? 'SHOW' : 'HIDE'} [F]`;

        document.getElementById('hud-seed').style.display = this.showSeed ? 'block' : 'none';
        document.getElementById('hud-fps').style.display = this.showFPS ? 'block' : 'none';
    }

    triggerDeath() {
        this.state = 'DEAD';
        this.audioEngine.stopMusic();
        this.audioEngine.playSFX('death');
        
        // Trigger visual feedback (shake, red flash, particles explosion)
        this.screenShakeTime = 0.4;
        this.screenShakeIntensity = 18;
        this.flashTime = 0.25;
        this.flashColor = '#ff003c';
        
        this.particleSystem.spawnExplosion(this.player.x + this.player.width/2, this.player.y + this.player.height/2, this.player.color, 35);
        
        // Update death HUD
        document.getElementById('death-stats').innerText = `Attempt ${this.attempts} | ${Math.floor(this.score)} meters`;
        document.getElementById('death-ai-status').innerText = this.isAI ? 'ON' : 'OFF';
        document.getElementById('death-seed-val').innerText = this.currentSeed;
        
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('death-screen').classList.remove('hidden');
    }

    update(dt) {
        if (dt > 0.1) dt = 0.1; // Limit delta time to prevent clipping during lag spikes
        
        // Track frame counter
        this.fpsCounter++;
        this.fpsTimer += dt;
        if (this.fpsTimer >= 1.0) {
            this.fps = this.fpsCounter;
            this.fpsCounter = 0;
            this.fpsTimer = 0;
            document.getElementById('hud-fps').innerText = `${this.fps} FPS`;
        }

        // Screen effects decay
        if (this.screenShakeTime > 0) this.screenShakeTime -= dt;
        if (this.flashTime > 0) this.flashTime -= dt;
        
        if (this.isMirrorVisual) {
            this.mirrorTimer -= dt;
            if (this.mirrorTimer <= 0) {
                this.isMirrorVisual = false;
            }
        }

        this.particleSystem.update(dt);

        if (this.state !== 'PLAYING' || !this.player || !this.levelGen) return;

        // Auto-play AI action decisions
        let act = { hold: false, press: false };
        if (this.isAI) {
            let diffConfig = DIFFICULTIES[this.difficulty];
            act = this.ai.update(this.player, this.levelGen.activeChunks, this.floorY, this.ceilingY, diffConfig);
        } else {
            // Player controls mapping
            act.hold = this.inputHeld;
            act.press = this.inputPressed && !this.prevInputHeld; // Single triggers only
        }

        // Update player physics state
        this.player.update(dt, act.hold, act.press, this.floorY, this.ceilingY, this.soundOn ? this.audioEngine : null, this.particleSystem);
        
        // Update dual partner clone if active
        if (this.player.isDual && this.player.dualPartner) {
            // Dual clone behaves similarly with inverted gravity update
            this.player.dualPartner.update(dt, act.hold, act.press, this.floorY, this.ceilingY, null, this.particleSystem);
            // Move companion at same velocity
            this.player.dualPartner.vx = this.player.vx;
            this.player.dualPartner.x = this.player.x; 
        }

        this.prevInputHeld = this.inputHeld;
        this.inputPressed = false; // Reset tap

        // Run level procedural chunks generation check
        let playerX = this.player.x;
        let lastChunk = this.levelGen.activeChunks[this.levelGen.activeChunks.length - 1];
        if (playerX > lastChunk.x - 1200) {
            this.levelGen.generateNextChunk();
        }
        this.levelGen.cleanUpPassedChunks(playerX);

        // Check collision with hazards and interactions with items
        this.resolveCollisions();

        // Update camera tracking
        this.cameraX = playerX - 180;
        // Smooth vertical tracking
        this.cameraY += (this.player.y - 280 - this.cameraY) * 5 * dt;

        // Calculate score progress based on X travel
        this.score = playerX / 10;
        document.getElementById('hud-score').innerText = `${Math.floor(this.score).toLocaleString()}m`;
        document.getElementById('hud-mode').innerText = this.player.mode;
        document.getElementById('hud-mode').style.color = this.player.color;
        document.getElementById('hud-seed').innerText = `SEED: ${this.currentSeed}`;

        // HUD mini progress bar (percentage of current chunk completed)
        let currentChunkIndex = Math.floor(playerX / 1000);
        let progress = ((playerX % 1000) / 1000) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    resolveCollisions() {
        this.resolvePlayerCollisions(this.player);
        if (this.player.isDual && this.player.dualPartner) {
            this.resolvePlayerCollisions(this.player.dualPartner);
        }
    }

    resolvePlayerCollisions(playerInstance) {
        let pBox = {
            x: playerInstance.x,
            y: playerInstance.y,
            w: playerInstance.width,
            h: playerInstance.height
        };

        for (let chunk of this.levelGen.activeChunks) {
            for (let obs of chunk.objects) {
                if (obs.isCollected) continue;

                let oBox = obs.getHitbox();

                // AABB Overlap check
                if (pBox.x < oBox.x + oBox.w &&
                    pBox.x + pBox.w > oBox.x &&
                    pBox.y < oBox.y + oBox.h &&
                    pBox.y + pBox.h > oBox.y) {
                    
                    // Handle Coin collections
                    if (obs.type === OBSTACLE_TYPES.COIN) {
                        obs.isCollected = true;
                        this.collectedCoins++;
                        this.updateHUDCoins();
                        if (this.soundOn) this.audioEngine.playSFX('coin');
                        this.particleSystem.spawnOrbCollect(obs.x + obs.w/2, obs.y + obs.h/2, '#ffd700');
                        continue;
                    }

                    // Handle Portals
                    if (obs.type.startsWith('portal_')) {
                        if (obs.hasActivated) continue;
                        obs.hasActivated = true;

                        let modeName = obs.type.replace('portal_', '').toUpperCase();
                        if (GAME_MODES[modeName] && playerInstance.mode !== GAME_MODES[modeName]) {
                            playerInstance.mode = GAME_MODES[modeName];
                            this.triggerScreenFlash(playerInstance.color);
                            this.audioEngine.playSFX('jump_cube');
                            this.particleSystem.spawnPortalEntry(obs.x + obs.w/2, obs.y + obs.h/2, playerInstance.color);
                        } else if (obs.type === PORTAL_TYPES.SIZE_MINI) {
                            playerInstance.sizeMultiplier = 0.5;
                        } else if (obs.type === PORTAL_TYPES.SIZE_NORMAL) {
                            playerInstance.sizeMultiplier = 1.0;
                        } else if (obs.type === PORTAL_TYPES.SPEED_SLOW) {
                            playerInstance.vx = DIFFICULTIES[this.difficulty].speed * 0.6;
                        } else if (obs.type === PORTAL_TYPES.SPEED_NORMAL) {
                            playerInstance.vx = DIFFICULTIES[this.difficulty].speed;
                        } else if (obs.type === PORTAL_TYPES.SPEED_FAST) {
                            playerInstance.vx = DIFFICULTIES[this.difficulty].speed * 1.5;
                        } else if (obs.type === PORTAL_TYPES.GRAVITY_FLIP) {
                            playerInstance.gravitySign = -1;
                            this.triggerScreenFlash('#ff00ff');
                            this.audioEngine.playSFX('gravity');
                        } else if (obs.type === PORTAL_TYPES.GRAVITY_NORMAL) {
                            playerInstance.gravitySign = 1;
                            this.triggerScreenFlash('#00ffff');
                            this.audioEngine.playSFX('gravity');
                        } else if (obs.type === PORTAL_TYPES.MIRROR) {
                            this.isMirrorVisual = true;
                            this.mirrorTimer = 4.0;
                            this.triggerScreenFlash('#ffffff');
                        } else if (obs.type === PORTAL_TYPES.DUAL) {
                            playerInstance.isDual = true;
                            playerInstance.dualPartner = playerInstance.clone();
                            this.triggerScreenFlash('#ffcc00');
                        }
                        continue;
                    }

                    // Handle Pads & Orbs interactions (Non-lethals)
                    if (obs.type === OBSTACLE_TYPES.BOUNCE_PAD_YELLOW) {
                        playerInstance.triggerBouncePad('yellow', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.BOUNCE_PAD_RED) {
                        playerInstance.triggerBouncePad('red', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.BOUNCE_PAD_BLUE) {
                        playerInstance.triggerBouncePad('blue', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.ORB_BLUE) {
                        playerInstance.triggerOrb('blue', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.ORB_GREEN) {
                        playerInstance.triggerOrb('green', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.ORB_PINK) {
                        playerInstance.triggerOrb('pink', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.ORB_YELLOW) {
                        playerInstance.triggerOrb('yellow', this.soundOn ? this.audioEngine : null);
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.DASH_ORB) {
                        playerInstance.vy = playerInstance.jumpForce * 1.6 * playerInstance.gravitySign;
                        continue;
                    } else if (obs.type === OBSTACLE_TYPES.GRAVITY_WELL) {
                        playerInstance.vy += (playerInstance.gravitySign * 800 * 1/60);
                        continue;
                    }

                    // Handle Platform platforms & crumbling platform landing logic
                    if (obs.type === OBSTACLE_TYPES.PLATFORM || obs.type === OBSTACLE_TYPES.CRUMBLING_PLATFORM || obs.type === OBSTACLE_TYPES.MOVING_PLATFORM) {
                        let isFallingOnPlatform = false;
                        if (playerInstance.gravitySign === 1 && playerInstance.vy >= 0 && playerInstance.y + playerInstance.height <= obs.y + 12) {
                            isFallingOnPlatform = true;
                        } else if (playerInstance.gravitySign === -1 && playerInstance.vy <= 0 && playerInstance.y >= obs.y + obs.h - 12) {
                            isFallingOnPlatform = true;
                        }

                        if (isFallingOnPlatform) {
                            playerInstance.vy = 0;
                            playerInstance.isGrounded = true;
                            if (playerInstance.gravitySign === 1) {
                                playerInstance.y = obs.y - playerInstance.height;
                            } else {
                                playerInstance.y = obs.y + obs.h;
                            }
                            
                            // Crumbling triggers
                            if (obs.type === OBSTACLE_TYPES.CRUMBLING_PLATFORM) {
                                obs.isCrumbling = true;
                            }
                        } else {
                            // Hit wall of platform from side -> Crashing!
                            if (pBox.x + pBox.w - 5 > obs.x && pBox.x + 5 < obs.x + obs.w) {
                                this.triggerDeath();
                                return;
                            }
                        }
                        continue;
                    }

                    // Lethal obstacles -> triggers death (Fake spikes pass through)
                    if (obs.type === OBSTACLE_TYPES.FAKE_SPIKE) continue;
                    if (obs.type === OBSTACLE_TYPES.INVISIBLE_SPIKE && obs.opacity < 0.4) continue;

                    this.triggerDeath();
                    return;
                }
            }
        }
    }

    triggerScreenFlash(color) {
        this.flashTime = 0.15;
        this.flashColor = color;
    }

    updateHUDCoins() {
        document.getElementById('hud-coins').innerText = `COINS: ${this.collectedCoins}/3`;
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // Apply screen shake camera offsets
        let camOffsetX = 0;
        let camOffsetY = 0;
        if (this.screenShakeTime > 0) {
            camOffsetX = (Math.random() - 0.5) * this.screenShakeIntensity;
            camOffsetY = (Math.random() - 0.5) * this.screenShakeIntensity;
        }

        this.ctx.save();
        
        // Mirror visual flip (horizontal flip centered on canvas)
        if (this.isMirrorVisual) {
            this.ctx.translate(this.canvas.width, 0);
            this.ctx.scale(-1, 1);
        }

        this.ctx.translate(-this.cameraX + camOffsetX, -this.cameraY + camOffsetY);
        // Render backgrounds, parallax layers, grids
        this.drawParallaxBackground();

        // Render floor & ceiling bounds
        this.drawWorldBounds();

        // Render level objects
        if (this.levelGen && this.player) {
            for (let chunk of this.levelGen.activeChunks) {
                for (let obs of chunk.objects) {
                    // Update obstacle parameters first
                    obs.update(1/60, this.player.x);
                    obs.draw(this.ctx);
                }
            }
        }

        // Draw AI visual overlays
        if (this.isAI && this.state === 'PLAYING') {
            this.drawAIDebugOverlays();
        }

        // Render particles
        this.particleSystem.draw(this.ctx);

        // Render player character
        if (this.state === 'PLAYING') {
            this.player.draw(this.ctx);
            
            // Render dual partner clone if active
            if (this.player.isDual && this.player.dualPartner) {
                this.player.dualPartner.draw(this.ctx);
            }
        }
        this.ctx.restore();

        // Render color screen flashes
        if (this.flashTime > 0) {
            this.ctx.fillStyle = this.flashColor;
            this.ctx.globalAlpha = (this.flashTime / 0.15) * 0.25;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            this.ctx.globalAlpha = 1.0;
        }
    }

    drawParallaxBackground() {
        let width = this.canvas.width;
        let height = this.canvas.height;
        
        // Deep space color
        this.ctx.fillStyle = '#050512';
        this.ctx.fillRect(this.cameraX, this.cameraY, width, height);

        // Render background grid
        this.ctx.strokeStyle = '#0f0f35';
        this.ctx.lineWidth = 1;
        let gridSize = 80;
        let startGridX = Math.floor(this.cameraX / gridSize) * gridSize;
        let startGridY = Math.floor(this.cameraY / gridSize) * gridSize;

        this.ctx.beginPath();
        for (let x = startGridX; x < this.cameraX + width + gridSize; x += gridSize) {
            this.ctx.moveTo(x, this.cameraY);
            this.ctx.lineTo(x, this.cameraY + height);
        }
        for (let y = startGridY; y < this.cameraY + height + gridSize; y += gridSize) {
            this.ctx.moveTo(this.cameraX, y);
            this.ctx.lineTo(this.cameraX + width, y);
        }
        this.ctx.stroke();

        // Parallax stars layer
        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        for (let i = 0; i < 40; i++) {
            // Using deterministic placement base coordinates
            let px = (Math.sin(i * 123.45) * 0.5 + 0.5) * 3000;
            let py = (Math.cos(i * 543.21) * 0.5 + 0.5) * 600;
            // Move slower than camera (parallax)
            let starX = px + this.cameraX * 0.7;
            this.ctx.fillRect(starX % 3000, py, 2, 2);
        }
    }

    drawWorldBounds() {
        let w = this.canvas.width;
        
        // Floor line neon neon cyan
        this.ctx.strokeStyle = '#00ffff';
        this.ctx.shadowColor = '#00ffff';
        this.ctx.shadowBlur = 10;
        this.ctx.lineWidth = 4;
        this.ctx.beginPath();
        this.ctx.moveTo(this.cameraX, this.floorY);
        this.ctx.lineTo(this.cameraX + w, this.floorY);
        this.ctx.stroke();
        
        // Ceiling line neon magenta
        this.ctx.strokeStyle = '#ff00ff';
        this.ctx.shadowColor = '#ff00ff';
        this.ctx.shadowBlur = 10;
        this.ctx.beginPath();
        this.ctx.moveTo(this.cameraX, this.ceilingY);
        this.ctx.lineTo(this.cameraX + w, this.ceilingY);
        this.ctx.stroke();
        
        this.ctx.shadowBlur = 0; // reset
    }

    drawAIDebugOverlays() {
        if (!this.player || !this.ai.detectionBox) return;
        // Translucent green box showing AI detection zone ahead
        this.ctx.fillStyle = 'rgba(0, 255, 136, 0.05)';
        this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
        this.ctx.lineWidth = 1.5;
        this.ctx.fillRect(this.ai.detectionBox.x, this.ai.detectionBox.y, this.ai.detectionBox.w, this.ai.detectionBox.h);
        this.ctx.strokeRect(this.ai.detectionBox.x, this.ai.detectionBox.y, this.ai.detectionBox.w, this.ai.detectionBox.h);
        // Draw predicted trajectory path
        if (this.ai.predictedTrajectory.length > 1) {
            this.ctx.strokeStyle = '#00ff88';
            this.ctx.lineWidth = 2.5;
            this.ctx.beginPath();
            this.ctx.moveTo(this.ai.predictedTrajectory[0].x, this.ai.predictedTrajectory[0].y);
            for (let i = 1; i < this.ai.predictedTrajectory.length; i++) {
                this.ctx.lineTo(this.ai.predictedTrajectory[i].x, this.ai.predictedTrajectory[i].y);
            }
            this.ctx.stroke();
            
            // Tiny arrow indicating forward target vector
            let lastPos = this.ai.predictedTrajectory[this.ai.predictedTrajectory.length - 1];
            this.ctx.fillStyle = '#00ff88';
            this.ctx.beginPath();
            this.ctx.arc(lastPos.x, lastPos.y, 4, 0, Math.PI*2);
            this.ctx.fill();
        }
    }
}



// Instantiate the game and start the requestAnimationFrame loop
let game;

// Setup Menu UI listeners and populate difficulty cards
window.addEventListener('load', () => {
    const diffGrid = document.getElementById('difficulty-grid');
    
    // Create cards for each difficulty
    Object.values(DIFFICULTIES).forEach(diff => {
        const card = document.createElement('div');
        card.className = `diff-card diff-${diff.id.toLowerCase()}`;
        if (diff.id === 'NORMAL') card.classList.add('selected');
        card.style.color = diff.color;
        
        card.innerHTML = `
            <div class="diff-icon">${diff.icon}</div>
            <div class="diff-name">${diff.name}</div>
            <div class="diff-stars">${'★'.repeat(diff.stars || 1)}</div>
        `;
        
        card.addEventListener('click', () => {
            document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            if (game) {
                game.difficulty = diff.id;
            }
        });
        
        diffGrid.appendChild(card);
    });

    game = new GameEngine();

    // Hook settings panel buttons
    document.getElementById('toggle-ai-menu').addEventListener('click', () => {
        game.isAI = !game.isAI;
        game.updateSettingsUI();
        document.getElementById('hud-ai-status').innerText = game.isAI ? 'ON' : 'OFF';
        document.getElementById('hud-ai-status').style.color = game.isAI ? '#00ff88' : '#ff3366';
    });

    document.getElementById('toggle-sound-menu').addEventListener('click', () => {
        game.soundOn = !game.soundOn;
        game.updateSettingsUI();
    });

    document.getElementById('toggle-seed-menu').addEventListener('click', () => {
        game.showSeed = !game.showSeed;
        game.updateSettingsUI();
    });

    document.getElementById('toggle-fps-menu').addEventListener('click', () => {
        game.showFPS = !game.showFPS;
        game.updateSettingsUI();
    });

    document.getElementById('volume-slider').addEventListener('input', (e) => {
        game.volume = e.target.value / 100;
        game.audioEngine.setVolume(game.volume);
    });

    // Start Button
    document.getElementById('start-btn').addEventListener('click', () => {
        // Generate seed if not specified or set randomly
        const seedVal = Math.floor(Math.random() * 999999);
        game.initRun(seedVal, game.difficulty);
    });

    // Restart Button
    document.getElementById('restart-btn').addEventListener('click', () => {
        game.restartRun();
    });

    // Menu button
    document.getElementById('menu-btn').addEventListener('click', () => {
        game.showMenu();
    });

    // Audio Unlock Overlay
    const unlockBtn = document.getElementById('unlock-btn');
    const unlockOverlay = document.getElementById('audio-unlock-overlay');
    
    const unlockFunc = () => {
        game.audioEngine.init();
        unlockOverlay.classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    };

    unlockBtn.addEventListener('click', unlockFunc);
    unlockOverlay.addEventListener('click', unlockFunc);

    // Run game loop
    function loop(timestamp) {
        let dt = (timestamp - game.lastTime) / 1000;
        game.lastTime = timestamp;
        
        // Update & Render
        game.update(dt);
        game.draw();
        
        requestAnimationFrame(loop);
    }
    
    game.lastTime = performance.now();
    requestAnimationFrame(loop);
});

    </script>
