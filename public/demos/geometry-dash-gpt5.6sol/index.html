<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#070713">
  <title>Neon Dash Infinite</title>
  <style>
    :root{--cyan:#29f5ff;--magenta:#ff35dc;--lime:#78ff55;--orange:#ff9b32;--ink:#070713}
    *{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--ink);font-family:Impact,"Arial Black",system-ui,sans-serif;color:#fff}
    #game{position:fixed;inset:0;width:100%;height:100%;display:block;background:#070713}
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 50% 30%,rgba(38,25,91,.78),rgba(5,5,16,.94));z-index:4;overflow:auto}
    #menu.hidden{display:none}
    .panel{width:min(920px,96vw);padding:26px;border:2px solid rgba(41,245,255,.55);border-radius:18px;background:rgba(8,9,29,.88);box-shadow:0 0 50px rgba(41,245,255,.18),inset 0 0 25px rgba(255,53,220,.08);text-align:center}
    h1{margin:0 0 4px;font-size:clamp(35px,7vw,76px);letter-spacing:3px;line-height:.95;color:#fff;text-shadow:0 4px 0 #111,0 0 12px var(--cyan),0 0 28px var(--magenta)}
    .sub{margin:8px 0 18px;color:#bcecff;letter-spacing:2px;font-family:system-ui,sans-serif;font-weight:900;font-size:12px}
    #difficultyGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .diff{position:relative;min-height:116px;padding:12px 8px;border:2px solid color-mix(in srgb,var(--c) 65%,white);border-radius:13px;background:linear-gradient(145deg,color-mix(in srgb,var(--c) 18%,#0b0c22),#090a1a);color:#fff;cursor:pointer;box-shadow:inset 0 0 18px color-mix(in srgb,var(--c) 12%,transparent);transition:.15s transform,.15s box-shadow,.15s border-color}
    .diff:hover,.diff.selected{transform:translateY(-3px) scale(1.015);border-color:#fff;box-shadow:0 0 22px color-mix(in srgb,var(--c) 60%,transparent),inset 0 0 24px color-mix(in srgb,var(--c) 20%,transparent)}
    .face{display:block;font-size:36px;filter:drop-shadow(0 0 8px var(--c))}
    .diff strong{display:block;margin-top:3px;font-size:17px;letter-spacing:1px;text-shadow:0 2px #000}
    .stars{color:var(--c);font-family:system-ui,sans-serif;font-weight:1000;font-size:11px;letter-spacing:1px}
    .desc{display:block;margin-top:3px;font:700 10px/1.25 system-ui,sans-serif;color:#d9ddff}
    .row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:17px}
    button,#startBtn{border:2px solid #fff;border-radius:10px;padding:13px 30px;background:linear-gradient(#65ff67,#19aa43);color:#fff;font:900 18px Impact,"Arial Black",sans-serif;letter-spacing:2px;text-shadow:0 2px #084d20;box-shadow:0 4px 0 #08742e,0 0 18px rgba(66,255,112,.45);cursor:pointer}
    button:active{transform:translateY(3px);box-shadow:0 1px 0 #08742e}
    #seedInput{width:190px;padding:12px;border:2px solid #7379a9;border-radius:9px;background:#08091b;color:#fff;font:800 14px system-ui,sans-serif;outline:none;touch-action:auto;user-select:text;-webkit-user-select:text}
    .tips{margin:15px 0 0;font:700 11px/1.55 system-ui,sans-serif;color:#929bc8}
    #volumeBox{position:fixed;right:14px;bottom:13px;z-index:5;display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid #505684;border-radius:8px;background:rgba(5,6,20,.72);font:800 10px system-ui,sans-serif;letter-spacing:1px}
    #volume{width:100px;accent-color:#29f5ff;touch-action:auto}
    @media(max-width:650px){#difficultyGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.panel{padding:16px}.diff{min-height:96px;padding:7px}.face{font-size:29px}.desc{display:none}.tips{font-size:9px}#volumeBox{right:7px;bottom:7px}}
  </style>
</head>
<body>
  <canvas id="game" aria-label="Neon Dash Infinite game canvas"></canvas>
  <div id="menu">
    <div class="panel">
      <h1>NEON DASH</h1>
      <div class="sub">INFINITE PROCEDURAL AUTO-RUNNER</div>
      <div id="difficultyGrid"></div>
      <div class="row">
        <input id="seedInput" aria-label="Level seed" maxlength="16" placeholder="SEED (random if blank)">
        <button id="startBtn">START RUN</button>
      </div>
      <p class="tips">CLICK / SPACE / W / ↑ TO ACT · A TOGGLE AI · R RESTART · D DIFFICULTY · F FPS · M MUTE · S SEED · ESC PAUSE</p>
    </div>
  </div>
  <label id="volumeBox">VOL <input id="volume" type="range" min="0" max="1" step="0.01" value="0.38"></label>
<script>
(()=>{'use strict';
const C=document.getElementById('game'),ctx=C.getContext('2d',{alpha:false});
const menu=document.getElementById('menu'),grid=document.getElementById('difficultyGrid'),seedInput=document.getElementById('seedInput');
const W=1280,H=720,FLOOR=620,CEIL=100,TAU=Math.PI*2;
let dpr=1,viewScale=1,viewX=0,viewY=0;
function resize(){dpr=Math.min(2,devicePixelRatio||1);C.width=Math.floor(innerWidth*dpr);C.height=Math.floor(innerHeight*dpr);C.style.width=innerWidth+'px';C.style.height=innerHeight+'px';viewScale=Math.min(innerWidth/W,innerHeight/H);viewX=(innerWidth-W*viewScale)/2;viewY=(innerHeight-H*viewScale)/2}
addEventListener('resize',resize);resize();

const MODES={
 cube:{name:'CUBE',color:'#29f5ff',icon:'■'},ship:{name:'SHIP',color:'#65ff55',icon:'▲'},ufo:{name:'UFO',color:'#ff9a35',icon:'●'},
 wave:{name:'WAVE',color:'#ff43d7',icon:'╱'},ball:{name:'BALL',color:'#ff465d',icon:'●'},robot:{name:'ROBOT',color:'#c5d0dc',icon:'▣'},spider:{name:'SPIDER',color:'#b75cff',icon:'⬢'}
};
const DIFFS=[
 {id:'easy',name:'EASY',face:'☺',stars:'1★–2★',color:'#32baff',speed:280,density:.55,range:500,bpm:105,move:.55,portal:.18,fake:0,invis:0,dual:0,strict:.6,shake:5},
 {id:'normal',name:'NORMAL',face:'•‿•',stars:'3★–4★',color:'#52e875',speed:335,density:.8,range:430,bpm:120,move:.8,portal:.38,fake:0,invis:.02,dual:0,strict:.8,shake:7},
 {id:'hard',name:'HARD',face:'◉︵◉',stars:'5★–6★',color:'#ff9d32',speed:390,density:1.05,range:360,bpm:138,move:1.15,portal:.62,fake:.08,invis:.04,dual:.02,strict:1,shake:10},
 {id:'harder',name:'HARDER',face:'☹',stars:'7★–8★',color:'#ff465d',speed:440,density:1.3,range:320,bpm:154,move:1.55,portal:.82,fake:.12,invis:.1,dual:.1,strict:1.2,shake:13},
 {id:'insane',name:'INSANE',face:'ಠ益ಠ',stars:'9★',color:'#b75cff',speed:500,density:1.6,range:285,bpm:170,move:1.9,portal:1,fake:.16,invis:.15,dual:.2,strict:1.42,shake:16},
 {id:'demon',name:'EXTREME DEMON',face:'♈',stars:'10★',color:'#a71935',speed:565,density:1.9,range:255,bpm:188,move:2.35,portal:1,fake:.2,invis:.22,dual:.32,strict:1.65,shake:20}
];
let selected=1;
DIFFS.forEach((d,i)=>{const b=document.createElement('button');b.className='diff'+(i===selected?' selected':'');b.style.setProperty('--c',d.color);b.innerHTML=`<span class="face">${d.face}</span><strong>${d.name}</strong><span class="stars">${d.stars}</span><span class="desc">${i<2?'Forgiving routes and wider timing':i<4?'Dense hazards and rapid switches':'All systems. Maximum intensity.'}</span>`;b.onclick=()=>selectDiff(i);grid.appendChild(b)});
function selectDiff(i){selected=(i+DIFFS.length)%DIFFS.length;[...grid.children].forEach((e,j)=>e.classList.toggle('selected',j===selected))}

function hashSeed(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function mulberry32(a){return()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let rng=Math.random,seed=0;
const rand=(a=1,b=0)=>b+(a-b)*rng(),frand=(a=1,b=0)=>b+(a-b)*Math.random(),pick=a=>a[Math.floor(rng()*a.length)],clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t;

const audio={ctx:null,master:null,volume:.38,muted:false,nextBeat:0,beatN:0,
 init(){if(this.ctx){this.ctx.resume();return}const A=window.AudioContext||window.webkitAudioContext;if(!A)return;this.ctx=new A();this.master=this.ctx.createGain();this.master.gain.value=this.volume;this.master.connect(this.ctx.destination)},
 tone(freq,dur=.08,type='sine',vol=.08,slide=1,when=0){if(!this.ctx||this.muted)return;const t=this.ctx.currentTime+when,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.setValueAtTime(Math.max(20,freq),t);o.frequency.exponentialRampToValueAtTime(Math.max(20,freq*slide),t+dur);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+.008);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(this.master);o.start(t);o.stop(t+dur+.02)},
 noise(dur=.06,vol=.05,when=0,low=false){if(!this.ctx||this.muted)return;const sr=this.ctx.sampleRate,buf=this.ctx.createBuffer(1,sr*dur,sr),data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);const s=this.ctx.createBufferSource(),f=this.ctx.createBiquadFilter(),g=this.ctx.createGain(),t=this.ctx.currentTime+when;s.buffer=buf;f.type=low?'lowpass':'highpass';f.frequency.value=low?220:3500;g.gain.value=vol;s.connect(f);f.connect(g);g.connect(this.master);s.start(t)},
 sound(n){const m=game.player?.mode||'cube';if(n==='jump'){const q={cube:[520,.07,'square',.05,1.5],ship:[180,.14,'sawtooth',.035,2],ufo:[250,.11,'square',.035,1.8],wave:[650,.1,'sine',.04,.45],ball:[180,.16,'sine',.06,2.2],robot:[120,.09,'square',.055,.75],spider:[900,.08,'sawtooth',.04,.25]}[m];this.tone(...q)}else if(n==='orb'){this.tone(660,.12,'sine',.06,1.5);this.tone(990,.13,'sine',.04,1.25,.06)}else if(n==='pad'){this.tone(130,.25,'sine',.08,3)}else if(n==='portal'){this.tone(220,.24,'sawtooth',.045,3)}else if(n==='gravity'){this.noise(.3,.07,0,false);this.tone(700,.27,'sine',.04,.2)}else if(n==='speed'){this.tone(90,.35,'sawtooth',.05,4)}else if(n==='coin'){[0,1,2].forEach(i=>this.tone(740+i*170,.12,'sine',.05,1, i*.055))}else if(n==='death'){this.noise(.45,.16,0,true);this.tone(90,.5,'sawtooth',.13,.25)}},
 music(time){if(!this.ctx||this.muted||state!=='PLAYING'||paused)return;const sec=60/game.cfg.bpm;while(time>=this.nextBeat){const n=this.beatN++;this.tone(65,.12,'sine',.09,.45);if(n%2===1)this.noise(.12,.045,0,false);this.noise(.035,.018,sec*.5,false);const scale=selected>3?[55,65.4,73.4,82.4]:[55,61.7,65.4,73.4];this.tone(scale[n%4],sec*.72,selected>2?'sawtooth':'triangle',.025+selected*.006,.8);if(selected>3)this.tone(scale[(n+2)%4]*2,.08,'square',.018,1.1,sec*.5);this.nextBeat+=sec;game.beat=Math.max(game.beat,n+1)}},
 reset(){if(this.ctx){this.nextBeat=this.ctx.currentTime+.08;this.beatN=0}}
};
document.getElementById('volume').oninput=e=>{audio.volume=+e.target.value;if(audio.master)audio.master.gain.value=audio.muted?0:audio.volume};

let state='MENU',paused=false,showFPS=false,showSeed=true,last=performance.now(),fps=60,fpsAcc=0,fpsCount=0,frameInput=false;
const input={held:false,pressed:false,manual:false};
function press(e){if(e?.target?.tagName==='INPUT')return;if(state==='MENU')return;if(state==='DEAD'){restart();return}if(paused)return;audio.init();input.held=true;input.pressed=true;input.manual=true}
function release(){input.held=false;input.manual=false}
C.addEventListener('pointerdown',e=>{e.preventDefault();press(e)});addEventListener('pointerup',release);addEventListener('pointercancel',release);
addEventListener('keydown',e=>{if(['Space','ArrowUp','KeyW'].includes(e.code)){e.preventDefault();if(!e.repeat)press(e)}if(e.code==='KeyA'&&state==='PLAYING'){game.ai=!game.ai;toast('AI '+(game.ai?'ONLINE':'MANUAL'),game.ai?'#66ff88':'#ff5a74')}if(e.code==='KeyR'&&state!=='MENU')restart();if(e.code==='KeyD'&&state==='MENU')selectDiff(selected+1);if(e.code==='KeyF')showFPS=!showFPS;if(e.code==='KeyM'){audio.muted=!audio.muted;if(audio.master)audio.master.gain.value=audio.muted?0:audio.volume;toast(audio.muted?'AUDIO MUTED':'AUDIO ON','#fff')}if(e.code==='KeyS')showSeed=!showSeed;if(e.code==='Escape'&&state==='PLAYING'){paused=!paused;audio.ctx?.[paused?'suspend':'resume']()}if(e.code==='Enter'&&state==='MENU')start()});
addEventListener('keyup',e=>{if(['Space','ArrowUp','KeyW'].includes(e.code))release()});
document.getElementById('startBtn').onclick=start;

let game={beat:0,time:0,cameraX:0,cameraY:0,attempt:0,deaths:0};
function baseGame(){return{cfg:DIFFS[selected],time:0,beat:0,attempt:(game.attempt||0)+1,deaths:game.deaths||0,score:0,bonus:0,cameraX:0,cameraY:0,zoom:1,targetZoom:1,speedMul:1,mirror:0,dual:0,flash:0,flashColor:'#fff',shake:0,ai:true,aiTimer:0,aiDecision:{held:false,press:false},chunkIndex:0,lastEnd:0,chunks:[],platforms:[],hazards:[],portals:[],orbs:[],pads:[],wells:[],coins:[],particles:[],texts:[],trails:[],player:null,second:null,chunkProgress:0,currentChunk:null,generated:0}}
function start(){audio.init();selected=clamp(selected,0,DIFFS.length-1);const raw=seedInput.value.trim();seed=raw?hashSeed(raw):(Date.now()^(Math.random()*0xffffffff))>>>0;seedInput.value=String(seed);rng=mulberry32(seed);game=baseGame();game.player=makePlayer(180,FLOOR-28,'cube');state='PLAYING';paused=false;menu.classList.add('hidden');buildInitial();audio.reset();toast('AI AUTO-PLAY ENGAGED','#63ff98')}
function restart(){if(state==='MENU')return;game=baseGame();game.player=makePlayer(180,FLOOR-28,'cube');rng=mulberry32(seed);state='PLAYING';paused=false;buildInitial();audio.reset()}
function makePlayer(x,y,mode){return{x,y,px:x,py:y,vx:0,vy:0,mode,size:42,mini:false,gravity:1,gravityTimer:0,grounded:true,jumps:0,hops:3,waveDir:-1,rot:0,holdTime:0,orbLock:0,padLock:0,portalLock:0,aiGuard:0,alive:true}}
function buildInitial(){addPlatform(-500,FLOOR,1300,200,'base');addPlatform(-500,0,1300,CEIL,'ceiling');game.lastEnd=800;while(game.lastEnd<5200)generateChunk();game.cameraX=0}

function addPlatform(x,y,w,h,type='base',opt={}){const p={x,y,w,h,type,baseX:x,baseY:y,axis:opt.axis||'y',amp:opt.amp||0,rate:opt.rate||1,phase:opt.phase||rand(TAU),crumb:0,broken:false};game.platforms.push(p);return p}
function addSpike(x,y,orient='up',size=38,opt={}){const h={kind:'spike',x,y,w:size,h:size,orient,baseX:x,baseY:y,fake:!!opt.fake,invisible:!!opt.invisible,move:opt.move||null,phase:rand(TAU),rate:opt.rate||1,amp:opt.amp||45,layer:opt.layer||'front'};game.hazards.push(h);return h}
function addSaw(x,y,r=28,opt={}){const h={kind:'saw',x,y,r,w:r*2,h:r*2,baseX:x,baseY:y,move:opt.move||null,phase:rand(TAU),rate:opt.rate||1,amp:opt.amp||55,rpm:opt.rpm||90,fake:false,invisible:!!opt.invisible,layer:opt.layer||'front'};game.hazards.push(h);return h}
function addPortal(x,y,type){const colors={cube:'#2d9cff',ship:'#56ff64',ufo:'#ff9a35',wave:'#ff42d7',ball:'#ff4057',robot:'#b8c4cf',spider:'#a85bff',gravity:'#39efff',mini:'#68ffcf',normal:'#f4f4ff',fast:'#54ff67',slow:'#ff3e4f',speed:'#ffe84b',mirror:'#7a72ff',dual:'#ffae35'};game.portals.push({x,y,w:34,h:128,type,color:colors[type],used:false,phase:rand(TAU)})}
function addOrb(x,y,type='blue'){const colors={blue:'#35b9ff',green:'#68ff66',pink:'#ff4ccd',yellow:'#ffe64f',dash:'#ff4ccd'};game.orbs.push({x,y,r:17,type,color:colors[type],used:false,phase:rand(TAU)})}
function addPad(x,y,type='yellow',orient='up'){const colors={yellow:'#ffe54a',red:'#ff4055',blue:'#39c9ff'};game.pads.push({x,y,w:54,h:12,type,orient,color:colors[type],usedAt:-99})}
function addCoin(x,y){game.coins.push({x,y,r:13,taken:false,phase:rand(TAU)})}
function addWell(x,y,strength=650){game.wells.push({x,y,r:125,strength,phase:rand(TAU)})}

const routeY=(c,x)=>{if(!c||!c.route?.length)return 400;const r=c.route;if(x<=r[0].x)return r[0].y;for(let i=1;i<r.length;i++)if(x<=r[i].x){const a=r[i-1],b=r[i];return lerp(a.y,b.y,(x-a.x)/(b.x-a.x))}return r[r.length-1].y};
function themeFor(i){const allowed=selected===0?['calm','stairs']:selected===1?['calm','stairs','ship','ball']:selected===2?['stairs','ship','ufo','wave','ball','robot']:['stairs','ship','ufo','wave','ball','robot','spider','rapid','boss'];if(i%7===0&&i>0)return selected>3?'boss':'calm';return pick(allowed)}
function generateChunk(){const start=game.lastEnd,w=Math.round(rand(1200,800)/20)*20,theme=themeFor(game.chunkIndex),c={start,end:start+w,width:w,theme,route:[],mode:'cube',valid:false,index:game.chunkIndex};const before={p:game.platforms.length,h:game.hazards.length,o:game.orbs.length,po:game.portals.length,pa:game.pads.length,we:game.wells.length,co:game.coins.length};
 buildChunk(c);c.valid=validateChunk(c);if(!c.valid){game.hazards.splice(before.h);game.platforms.splice(before.p);game.orbs.splice(before.o);game.portals.splice(before.po);game.pads.splice(before.pa);game.wells.splice(before.we);game.coins.splice(before.co);buildSafeFallback(c);c.valid=true}
 game.chunks.push(c);game.lastEnd=c.end;game.chunkIndex++;game.generated++}
function buildBounds(c,floor=FLOOR,ceil=CEIL){addPlatform(c.start, floor, c.width+4, H-floor+160,'base');addPlatform(c.start,0,c.width+4,ceil,'ceiling')}
function modePortal(c,mode){if(game.chunkIndex>0)addPortal(c.start+45,(CEIL+FLOOR)/2-64,mode);c.mode=mode}
function addDecorHazards(c,n){for(let i=0;i<n;i++){const x=c.start+rand(c.width-100,100),y=rand(560,150);addSaw(x,y,rand(18,9),{fake:true,layer:'mid',rpm:35})}}
function buildChunk(c){const d=game.cfg,x=c.start,w=c.width,theme=c.theme,den=d.density;
 if(theme==='calm'){modePortal(c,'cube');buildBounds(c);c.route=[{x,y:FLOOR-35},{x:x+w,y:FLOOR-35}];const n=Math.max(2,Math.floor(3*den));for(let i=0;i<n;i++){const sx=x+190+i*(w-300)/n+rand(35,-35);addSpike(sx,FLOOR-38,'up',38,{fake:rng()<d.fake,invisible:rng()<d.invis});if(rng()<.32)addPad(sx-80,FLOOR-12,pick(['yellow','yellow','red']))}addCoin(x+w*.33,FLOOR-150);addCoin(x+w*.58,FLOOR-190);addCoin(x+w*.82,FLOOR-135)}
 else if(theme==='stairs'){modePortal(c,selected>1&&rng()<.35?'robot':'cube');buildBounds(c);c.route=[{x,y:FLOOR-35},{x:x+w*.3,y:FLOOR-160},{x:x+w*.62,y:FLOOR-255},{x:x+w,y:FLOOR-35}];for(let i=0;i<4;i++){const px=x+220+i*145,py=FLOOR-55-i*48;addPlatform(px,py,118,18,i===3&&selected>2?'crumble':'ledge');addSpike(px+125,FLOOR-36,'up',36,{move:selected>2&&i===2?'y':null,rate:d.move});if(i<3)addOrb(px+58,py-65,pick(['blue','yellow','blue']))}if(selected>1)addSaw(x+w*.77,FLOOR-55,25,{move:'y',rate:d.move,amp:70});addCoin(x+w*.43,FLOOR-280);addCoin(x+w*.62,FLOOR-330);addCoin(x+w*.82,FLOOR-145)}
 else if(theme==='ship'){modePortal(c,'ship');buildBounds(c);const pts=5,amp=selected>2?135:95;c.route=[];for(let i=0;i<=pts;i++)c.route.push({x:x+i*w/pts,y:360+Math.sin(i*1.55+c.index)*amp});for(let i=1;i<pts;i++){const px=x+i*w/pts,cy=routeY(c,px),gap=selected>3?150:195;addSpike(px,CEIL,'down',44,{move:selected>2&&i%2?'y':null,rate:d.move,amp:35});addSpike(px,FLOOR-44,'up',44,{move:selected>2&&i%2===0?'y':null,rate:d.move,amp:35});if(i%2)addSaw(px+65,cy+(i%3-1)*80,24,{move:'y',rate:d.move,amp:Math.max(18,(520-gap)/5)})}addCoin(x+w*.35,routeY(c,x+w*.35));addCoin(x+w*.62,routeY(c,x+w*.62));addCoin(x+w*.84,routeY(c,x+w*.84))}

function burst(x,y,color,n=12,speed=180){for(let i=0;i<n&&game.particles.length<520;i++){const a=frand(TAU),v=frand(speed,speed*.25);game.particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:frand(.7,.25),max:.7,size:frand(7,2),color,grav:frand(260,40)})}}
function trail(p){if(game.trails.length<180)game.trails.push({x:p.x-p.size*.45,y:p.y,size:p.size*.35,color:MODES[p.mode].color,life:.42,max:.42,mode:p.mode})}
function floatText(x,y,text,color){game.texts.push({x,y,text,color,life:1.2})}
function toast(text,color){if(!game.texts)game.texts=[];game.texts.push({x:(game.player?.x||game.cameraX+W/2),y:175,text,color,life:1.5,screen:true})}
function kill(){if(state!=='PLAYING')return;state='DEAD';game.deaths++;game.shake=game.cfg.shake;game.flash=.42;game.flashColor='#ff244a';burst(game.player.x,game.player.y,MODES[game.player.mode].color,70,430);audio.sound('death')}
function updateFX(dt){for(const p of game.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;p.vx*=Math.pow(.1,dt);p.life-=dt}game.particles=game.particles.filter(p=>p.life>0);for(const t of game.trails)t.life-=dt;game.trails=game.trails.filter(t=>t.life>0);for(const t of game.texts){t.life-=dt;t.y-=25*dt}game.texts=game.texts.filter(t=>t.life>0);game.flash=Math.max(0,game.flash-dt);game.shake*=Math.pow(.025,dt);game.mirror=Math.max(0,game.mirror-dt);if(game.dual>0){game.dual-=dt;if(game.dual<=0)game.second=null}}

function update(dt){if(state!=='PLAYING'||paused){updateFX(dt);return}dt=Math.min(dt,.025);game.time+=dt;const beatSec=60/game.cfg.bpm;game.beat=Math.floor(game.time/beatSec);if(game.ai)aiThink(game.player,dt);updateWorld(dt);updatePlayer(game.player,dt);if(game.second)updatePlayer(game.second,dt,true);input.pressed=false;game.aiDecision.press=false;game.score=Math.floor((game.player.x-180)/10)+game.bonus;const targetX=game.player.x-300;game.cameraX=lerp(game.cameraX,targetX,1-Math.pow(.001,dt));const targetY=clamp(game.player.y-360,-90,90)*.16;game.cameraY=lerp(game.cameraY,targetY,1-Math.pow(.02,dt));game.zoom=lerp(game.zoom,game.targetZoom,1-Math.pow(.05,dt));const c=currentChunk();game.chunkProgress=c?clamp((game.player.x-c.start)/c.width,0,1):0;updateFX(dt)}

function glow(color,blur=14){ctx.shadowColor=color;ctx.shadowBlur=blur}
function noGlow(){ctx.shadowBlur=0;ctx.shadowColor='transparent'}
function pathRoundRect(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawBackground(){const pulse=.5+.5*Math.sin(game.beat*Math.PI+game.time*2);ctx.fillStyle='#070713';ctx.fillRect(0,0,W,H);const grad=ctx.createRadialGradient(W*.52,H*.42,20,W*.52,H*.45,700);grad.addColorStop(0,`rgba(36,20,82,${.35+pulse*.06})`);grad.addColorStop(1,'rgba(3,4,15,0)');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
 ctx.save();ctx.globalAlpha=.45;ctx.strokeStyle='#142548';ctx.lineWidth=1;const gx=((-game.cameraX*.08)%60+60)%60,gy=((-game.cameraY*.08)%60+60)%60;for(let x=gx;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=gy;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.restore();
 ctx.save();for(let i=0;i<55;i++){const sx=((i*197-game.cameraX*.035)%(W+100)+W+100)%(W+100)-50,sy=(i*83%540)+40,a=.25+.45*Math.sin(game.time*1.7+i);ctx.fillStyle=`rgba(95,190,255,${a})`;ctx.fillRect(sx,sy,1.5,1.5)}ctx.restore();
 ctx.save();ctx.globalAlpha=.17;ctx.strokeStyle='#a846ff';ctx.lineWidth=3;for(let i=0;i<14;i++){const x=((i*311-game.cameraX*.18)%(W+260)+W+260)%(W+260)-130,y=130+(i*97%430),s=28+(i%4)*14;ctx.save();ctx.translate(x,y);ctx.rotate(game.time*(i%2?-.08:.08));ctx.strokeRect(-s/2,-s/2,s,s);ctx.restore()}ctx.restore()}
function worldTransform(){const shakeX=game.shake?frand(game.shake,-game.shake):0,shakeY=game.shake?frand(game.shake,-game.shake):0;ctx.translate(W/2+shakeX,H/2+shakeY);ctx.scale(game.zoom,game.zoom);ctx.translate(-W/2,-H/2-game.cameraY);if(game.mirror>0){ctx.translate(W,0);ctx.scale(-1,1)}ctx.translate(-game.cameraX,0)}
function drawPlatforms(layer='front'){for(const p of game.platforms){if(!activePlatform(p)||p.x+p.w<game.cameraX-150||p.x>game.cameraX+W+150)continue;const col=p.type==='crumble'?'#ff9c46':p.type==='moving'?'#7d69ff':'#28d8ff';ctx.save();glow(col,8);ctx.fillStyle=p.type==='base'?'#111738':'#17244a';ctx.strokeStyle=col;ctx.lineWidth=3;ctx.fillRect(p.x,p.y,p.w,p.h);ctx.strokeRect(p.x,p.y,p.w,Math.min(p.h,22));if(p.type==='crumble'){ctx.strokeStyle='#ffcc76';ctx.beginPath();ctx.moveTo(p.x+p.w*.3,p.y);ctx.lineTo(p.x+p.w*.45,p.y+18);ctx.lineTo(p.x+p.w*.62,p.y);ctx.stroke()}if(p.type==='moving'){ctx.globalAlpha=.35;ctx.strokeStyle=col;ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(p.baseX+p.w/2,p.baseY-p.amp);ctx.lineTo(p.baseX+p.w/2,p.baseY+p.amp);ctx.stroke()}ctx.restore()}}
function spikePath(h){ctx.beginPath();if(h.orient==='down'){ctx.moveTo(h.x,h.y);ctx.lineTo(h.x+h.w,h.y);ctx.lineTo(h.x+h.w/2,h.y+h.h)}else{ctx.moveTo(h.x,h.y+h.h);ctx.lineTo(h.x+h.w,h.y+h.h);ctx.lineTo(h.x+h.w/2,h.y)}ctx.closePath()}
function drawSaw(h,alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.translate(h.x,h.y);ctx.rotate(game.time*h.rpm*TAU/60);ctx.beginPath();const teeth=12;for(let i=0;i<teeth*2;i++){const a=i*Math.PI/teeth,r=i%2?h.r*.72:h.r;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();glow('#ff4368',12);ctx.fillStyle=h.fake?'#532447':'#ff365b';ctx.strokeStyle='#ffb2c0';ctx.lineWidth=2;ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,h.r*.28,0,TAU);ctx.fillStyle='#10142c';ctx.fill();ctx.restore()}
function drawHazards(layer='front'){for(const h of game.hazards){if(h.layer!==layer||h.x+(h.r||h.w)<game.cameraX-100||h.x-(h.r||0)>game.cameraX+W+100)continue;let alpha=h.invisible?.12+.88*(.5+.5*Math.sin(game.time*2.3+h.phase)):1;if(h.fake)alpha*=.58;if(h.move){ctx.save();ctx.globalAlpha=.24;ctx.strokeStyle='#ff7192';ctx.setLineDash([6,7]);ctx.beginPath();if(h.move==='x'){ctx.moveTo(h.baseX-h.amp,h.baseY);ctx.lineTo(h.baseX+h.amp,h.baseY)}else{ctx.moveTo(h.baseX,h.baseY-h.amp);ctx.lineTo(h.baseX,h.baseY+h.amp)}ctx.stroke();ctx.restore()}if(h.kind==='saw'){drawSaw(h,alpha);continue}ctx.save();ctx.globalAlpha=alpha;spikePath(h);const col=h.fake?'#8b325f':'#ff3c72';glow(col,11);ctx.fillStyle=col;ctx.strokeStyle=h.fake?'#be5984':'#ffacd0';ctx.lineWidth=2;ctx.fill();ctx.stroke();ctx.restore()}}
function drawPortal(o){ctx.save();ctx.translate(o.x+o.w/2,o.y+o.h/2);const pulse=1+Math.sin(game.time*5+o.phase)*.08;ctx.scale(pulse,pulse);glow(o.color,22);ctx.strokeStyle=o.color;ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(0,0,o.w*.65,o.h*.48,0,0,TAU);ctx.stroke();if(o.type==='gravity'){ctx.strokeStyle='#ff43dc';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,0,o.w*.82,o.h*.39,0,.4,Math.PI+1);ctx.stroke()}ctx.lineWidth=2;ctx.globalAlpha=.75;for(let i=0;i<3;i++){ctx.rotate(game.time*(i%2?.45:-.4)+i);ctx.beginPath();ctx.arc(0,0,18+i*9,-.7,.7);ctx.stroke()}ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';const sy={cube:'■',ship:'▲',ufo:'●',wave:'╱',ball:'●',robot:'▣',spider:'⬢',gravity:'↕',mini:'−',normal:'+',fast:'»',slow:'‹',speed:'›',mirror:'↔',dual:'Ⅱ'}[o.type]||'?';ctx.fillText(sy,0,0);ctx.restore()}
function drawOrbs(){for(const o of game.orbs){if(o.used||o.x<game.cameraX-50||o.x>game.cameraX+W+50)continue;ctx.save();ctx.translate(o.x,o.y);const s=1+Math.sin(game.time*6+o.phase)*.14;ctx.scale(s,s);glow(o.color,16);ctx.strokeStyle=o.color;ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,o.r,0,TAU);ctx.stroke();ctx.globalAlpha=.65;ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(0,0,o.r*.5,0,TAU);ctx.fill();ctx.restore()}}
function drawPads(){for(const o of game.pads){ctx.save();glow(o.color,13);ctx.fillStyle=o.color;ctx.beginPath();ctx.moveTo(o.x,o.y+o.h);ctx.lineTo(o.x+7,o.y);ctx.lineTo(o.x+o.w-7,o.y);ctx.lineTo(o.x+o.w,o.y+o.h);ctx.closePath();ctx.fill();ctx.restore()}}
function drawWells(){for(const o of game.wells){ctx.save();ctx.translate(o.x,o.y);glow('#b456ff',16);for(let i=0;i<4;i++){ctx.strokeStyle=`rgba(180,86,255,${.65-i*.11})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,20+i*18,game.time*(1+i*.2)+i,game.time*(1+i*.2)+i+Math.PI*1.25);ctx.stroke()}ctx.fillStyle='#05030d';ctx.beginPath();ctx.arc(0,0,15,0,TAU);ctx.fill();ctx.restore()}}
function drawCoins(){for(const o of game.coins){if(o.taken)continue;ctx.save();ctx.translate(o.x,o.y);ctx.scale(.85+.15*Math.abs(Math.sin(game.time*3+o.phase)),1);glow('#ffe652',18);ctx.fillStyle='#ffcc24';ctx.strokeStyle='#fff18c';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,o.r,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#7c4c00';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('C',0,1);ctx.restore()}}
function drawPlayer(p,alpha=1){if(!p)return;const m=MODES[p.mode],s=p.size;ctx.save();ctx.globalAlpha=alpha;ctx.translate(p.x,p.y);ctx.rotate(p.mode==='wave'?0:p.rot);glow(m.color,18);ctx.fillStyle=m.color;ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(2,s*.07);
 if(p.mode==='cube'){ctx.fillRect(-s/2,-s/2,s,s);ctx.strokeRect(-s/2,-s/2,s,s);ctx.fillStyle='#071126';ctx.fillRect(-s*.25,-s*.18,s*.12,s*.14);ctx.fillRect(s*.12,-s*.18,s*.12,s*.14);ctx.fillRect(-s*.2,s*.13,s*.4,s*.08)}
 else if(p.mode==='ship'){ctx.beginPath();ctx.moveTo(s*.58,0);ctx.lineTo(-s*.48,-s*.36);ctx.lineTo(-s*.25,0);ctx.lineTo(-s*.48,s*.36);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#ffeb57';ctx.beginPath();ctx.moveTo(-s*.42,-s*.17);ctx.lineTo(-s*.8,0);ctx.lineTo(-s*.42,s*.17);ctx.fill()}
 else if(p.mode==='ufo'){ctx.beginPath();ctx.ellipse(0,s*.06,s*.55,s*.25,0,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#8ff8ff';ctx.beginPath();ctx.arc(0,-s*.13,s*.24,Math.PI,TAU);ctx.fill();ctx.stroke()}
 else if(p.mode==='wave'){ctx.lineCap='round';ctx.lineWidth=s*.22;ctx.strokeStyle=m.color;ctx.beginPath();ctx.moveTo(-s*.6,s*.38);ctx.lineTo(s*.6,-s*.38);ctx.stroke();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s*.54,-s*.34,s*.1,0,TAU);ctx.fill()}
 else if(p.mode==='ball'){ctx.beginPath();ctx.arc(0,0,s*.5,0,TAU);ctx.fill();ctx.stroke();ctx.strokeStyle='#511126';ctx.lineWidth=s*.13;ctx.beginPath();ctx.arc(0,0,s*.26,0,TAU);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.48,0);ctx.lineTo(s*.48,0);ctx.stroke()}
 else if(p.mode==='robot'){ctx.fillRect(-s*.46,-s*.4,s*.92,s*.8);ctx.strokeRect(-s*.46,-s*.4,s*.92,s*.8);ctx.beginPath();ctx.moveTo(0,-s*.4);ctx.lineTo(0,-s*.68);ctx.stroke();ctx.beginPath();ctx.arc(0,-s*.72,s*.08,0,TAU);ctx.fill();ctx.fillStyle='#101627';ctx.fillRect(-s*.25,-s*.14,s*.13,s*.14);ctx.fillRect(s*.12,-s*.14,s*.13,s*.14)}
 else {ctx.beginPath();for(let i=0;i<6;i++){const a=i*TAU/6;ctx.lineTo(Math.cos(a)*s*.5,Math.sin(a)*s*.5)}ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle=m.color;for(let i=0;i<4;i++){const yy=(i<2?-1:1)*s*.18,xx=(i%2?-1:1)*s*.35;ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx*1.7,yy*1.7);ctx.stroke()}}
 ctx.restore()}
function drawParticles(){for(const p of game.trails){ctx.save();ctx.globalAlpha=(p.life/p.max)*.28;ctx.fillStyle=p.color;glow(p.color,9);ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.max),0,TAU);ctx.fill();ctx.restore()}for(const p of game.particles){ctx.save();ctx.globalAlpha=clamp(p.life/p.max,0,1);ctx.fillStyle=p.color;glow(p.color,7);ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);ctx.restore()}for(const t of game.texts){if(t.screen)continue;ctx.save();ctx.globalAlpha=clamp(t.life,0,1);ctx.fillStyle=t.color;ctx.strokeStyle='#000';ctx.lineWidth=5;ctx.font='900 20px Arial Black';ctx.textAlign='center';ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);ctx.restore()}}
function drawAI(){if(!game.ai||state!=='PLAYING')return;const p=game.player,r=game.cfg.range;ctx.save();ctx.fillStyle='rgba(60,255,125,.055)';ctx.strokeStyle='rgba(92,255,145,.42)';ctx.lineWidth=1;ctx.setLineDash([8,8]);ctx.fillRect(p.x,p.y-135,r,270);ctx.strokeRect(p.x,p.y-135,r,270);ctx.setLineDash([]);ctx.strokeStyle='rgba(95,255,145,.8)';ctx.lineWidth=2;ctx.beginPath();let y=p.y,vy=p.vy,g=p.gravity,wave=p.waveDir;for(let i=0;i<40;i++){const dt=.025,x=p.x+i*game.cfg.speed*game.speedMul*dt;if(p.mode==='ship'){vy+=1220*g*dt;if(game.aiDecision.held)vy-=2050*g*dt}else if(p.mode==='wave'){vy=wave*game.cfg.speed*.82}else vy+=1850*g*dt;y+=vy*dt;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke();ctx.restore()}
function drawWorld(){ctx.save();worldTransform();drawHazards('mid');drawPlatforms();drawWells();drawPads();for(const p of game.portals)drawPortal(p);drawOrbs();drawCoins();drawHazards('front');drawAI();drawParticles();drawPlayer(game.second,.82);if(state!=='DEAD'||game.particles.length>12)drawPlayer(game.player,state==='DEAD'?0:1);ctx.restore()}
function outlined(text,x,y,size,align='left',color='#fff'){ctx.font=`900 ${size}px Impact,Arial Black,sans-serif`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.lineJoin='round';ctx.strokeStyle='#05050b';ctx.lineWidth=Math.max(4,size*.17);ctx.strokeText(text,x,y);ctx.fillStyle=color;ctx.fillText(text,x,y)}
function drawHUD(){const d=game.cfg,m=MODES[game.player.mode],pulse=.5+.5*Math.sin(game.time*TAU/(60/d.bpm));ctx.save();ctx.globalAlpha=.95;outlined(`${Math.floor(game.score).toLocaleString()} m`,24,38,28);outlined(`ATTEMPT ${game.attempt}`,25,69,15);outlined(`${m.icon} ${m.name}`,W/2,35,21,'center',m.color);outlined(`AI ${game.ai?'ON':'OFF'}  [A]`,W-24,35,17,'right',game.ai?'#65ff8b':'#ff5a72');outlined(`${d.name}  ${d.stars}`,W-24,65,14,'right',d.color);if(showSeed)outlined(`SEED ${seed}`,24,H-22,12);if(showFPS)outlined(`${fps.toFixed(0)} FPS`,W-24,H-22,12,'right','#b9f6ff');if(audio.muted)outlined('MUTED',W-24,H-44,11,'right','#ff6078');
 const bw=270,bx=W/2-bw/2,by=62;ctx.fillStyle='rgba(0,0,0,.55)';pathRoundRect(bx,by,bw,11,5);ctx.fill();const g=ctx.createLinearGradient(bx,0,bx+bw,0);g.addColorStop(0,'#29efff');g.addColorStop(1,'#ff35d3');ctx.fillStyle=g;pathRoundRect(bx,by,bw*game.chunkProgress,11,5);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.35)';ctx.strokeRect(bx,by,bw,11);ctx.fillStyle=d.color;glow(d.color,12+pulse*10);ctx.beginPath();ctx.arc(W/2,93,7+pulse*3,0,TAU);ctx.fill();noGlow();outlined('BEAT',W/2,111,10,'center','#d8e4ff');
 for(const t of game.texts){if(!t.screen)continue;ctx.save();ctx.globalAlpha=clamp(t.life,0,1);outlined(t.text,W/2,t.y,22,'center',t.color);ctx.restore()}if(game.dual>0)outlined(`DUAL ${game.dual.toFixed(1)}s`,W/2,140,15,'center','#ffb13d');if(game.mirror>0)outlined(`MIRROR ${game.mirror.toFixed(1)}s`,W/2,160,13,'center','#a9a4ff');ctx.restore()}
function drawOverlay(){if(paused){ctx.fillStyle='rgba(4,4,16,.68)';ctx.fillRect(0,0,W,H);outlined('PAUSED',W/2,H/2-15,58,'center','#fff');outlined('ESC TO RESUME',W/2,H/2+45,16,'center','#88dfff')}if(state==='DEAD'){ctx.fillStyle='rgba(8,2,14,.64)';ctx.fillRect(0,0,W,H);outlined('GAME OVER',W/2,H*.38,72,'center','#ff4567');outlined(`${Math.floor(game.score).toLocaleString()} m`,W/2,H*.5,32,'center','#fff');outlined(`ATTEMPT ${game.attempt}  ·  DEATHS ${game.deaths}`,W/2,H*.57,17,'center','#ffc3cf');outlined('CLICK / SPACE / R TO RESTART',W/2,H*.68,18,'center','#6ef7ff')}}
function render(){ctx.setTransform(dpr,0,0,dpr,0,0);ctx.fillStyle='#050510';ctx.fillRect(0,0,innerWidth,innerHeight);ctx.save();ctx.translate(viewX,viewY);ctx.scale(viewScale,viewScale);drawBackground();if(state!=='MENU'){drawWorld();drawHUD();drawOverlay();if(game.flash>0){ctx.globalAlpha=clamp(game.flash*2.7,0,.7);ctx.fillStyle=game.flashColor;ctx.fillRect(0,0,W,H)}}ctx.restore()}

function loop(now){const dt=Math.min(.05,(now-last)/1000||0);last=now;fpsAcc+=dt;fpsCount++;if(fpsAcc>.45){fps=fpsCount/fpsAcc;fpsAcc=0;fpsCount=0}if(state!=='MENU')update(dt);if(audio.ctx)audio.music(audio.ctx.currentTime);render();requestAnimationFrame(loop)}
window.__NEON_DASH_DEBUG__=()=>({state,paused,score:game.score||0,attempt:game.attempt||0,deaths:game.deaths||0,mode:game.player?.mode||null,x:Math.round(game.player?.x||0),y:Math.round(game.player?.y||0),chunks:game.generated||0,hazards:game.hazards?.length||0,ai:game.ai??true,seed,fps:Math.round(fps)});
